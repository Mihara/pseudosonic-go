name: Build Go Binaries

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [windows, linux, darwin]   # Target OS
        goarch: [amd64, arm64]           # Target architectures

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.4'
        # NB: Don't forget to update with go version in go.mod

    - name: Build
      run: |
        output="bin/${{ matrix.goos }}_${{ matrix.goarch }}/pseudosonic-go"
        if [ "${{ matrix.goos }}" == "windows" ]; then
          output="${output}.exe"
        fi
        echo "Building $output..."
        GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o $output main.go

    - name: Upload binaries
      uses: actions/upload-artifact@v3
      with:
        name: pseudosonic-go-${{ matrix.goos }}-${{ matrix.goarch }}
        path: bin/${{ matrix.goos }}_${{ matrix.goarch }}/*
